<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba JS completa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Tailwind correctamente cargado -->
  <script src="https://cdn.tailwindcss.comdy class="p-10 bg-gray-100">

  <h1 class="text-2xl font-bold mb-6">
    Prueba COMPLETA de ejecución JavaScript
  </h1>

  <button
    onclick="probar()"
    class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold shadow"
  >
    Probar JS
  </button>

  <div id="resultado" class="mt-6 font-bold text-green-600"></div>

  <script>
    function probar() {
      alert("✅ JavaScript SÍ se está ejecutando");
      document.getElementById("resultado").innerText =
        "✅ JavaScript SÍ se está ejecutando";
    }
  </script>

</body>
</html>
