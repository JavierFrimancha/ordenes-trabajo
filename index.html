<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Gestión de Órdenes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Tailwind cargado correctamente -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

  <div class="max-w-5xl mx-auto">

    <!-- TÍTULO -->
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-8">
      🛠️ Gestión de Órdenes de Trabajo
    </h1>

    <!-- BOTONERA -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <button onclick="vistaNueva()" class="menu-btn">➕ Nueva</button>
      <button onclick="vistaPendientes()" class="menu-btn">⏳ Pendientes</button>
      <button onclick="vistaHistorico()" class="menu-btn">📜 Histórico</button>
      <button onclick="vistaConsulta()" class="menu-btn">🔍 Consulta</button>
    </div>

    <!-- CONTENIDO -->
    <div id="vista" class="bg-white rounded-xl shadow p-6 min-h-[250px]">
      <p class="text-center text-gray-400">
        Selecciona una opción del menú
      </p>
    </div>

  </div>

  <!-- LÓGICA JS DE LAS VISTAS -->
  <script>
    const vista = document.getElementById("vista");

    function vistaNueva() {
      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">➕ Nueva orden</h2>
        <p>Aquí irá el formulario de creación.</p>
      `;
    }

    function vistaPendientes() {
      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">⏳ Pendientes</h2>
        <p>Aquí se mostrarán las órdenes pendientes.</p>
      `;
    }

    function vistaHistorico() {
      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">📜 Histórico</h2>
        <p>Aquí se mostrará el histórico.</p>
      `;
    }

    function vistaConsulta() {
      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">🔍 Consulta</h2>
        <p>Aquí se podrá buscar una orden por número.</p>
      `;
    }
  </script>

  <style>
    .menu-btn {
      background: white;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,.1);
      transition: background .15s, transform .15s;
    }
    .menu-btn:hover {
      background: #eef2ff;
      transform: translateY(-1px);
    }
  </style>

</body>
</html>
