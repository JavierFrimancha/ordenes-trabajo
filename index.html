<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Órdenes de Trabajo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Tailwind BIEN cargado -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto">

  <h1 class="text-3xl md:text-4xl font-bold text-center mb-8 text-indigo-700">
    🛠️ Gestión de Órdenes de Trabajo
  </h1>

  <!-- BOTONERA -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <button class="menu-btn" onclick="vistaNueva()">➕ Nueva</button>
    <button class="menu-btn" onclick="vistaPendientes()">⏳ Pendientes</button>
    <button class="menu-btn" onclick="vistaHistorico()">📜 Histórico</button>
  </div>

  <!-- CONTENIDO -->
  <div id="vista" class="bg-white rounded-xl shadow-xl p-6 min-h-[300px]">
    <p class="text-center text-gray-400">Selecciona una opción del menú</p>
  </div>

</div>

<script>
/* ================= CONFIG ================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbxKb6HMxO4tvf8KyvL5Zqj9p6LuawymwPm_WeY_1zCRuiAxIJwnME6mYRLPW9RLgPA9/exec";

const vista = document.getElementById("vista");

/* ================= API ================= */

async function apiGet(q) {
  const r = await fetch(API_URL + "?" + q);
  return r.json();
}

async function apiPost(data) {
  const r = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  return r.json();
}

/* ================= VISTA NUEVA ================= */

async function vistaNueva() {
  const lugares = await apiGet("accion=lugares");
  const deficiencias = await apiGet("accion=deficiencias");

  vista.innerHTML = `
    <h2 class="text-xl font-bold mb-4">➕ Nueva orden</h2>

    <form onsubmit="guardarOrden(event)" class="grid gap-4 md:grid-cols-2">

      <div>
        <label class="font-semibold text-sm">Nombre</label>
        <input id="nombre" required class="input">
      </div>

      <div>
        <label class="font-semibold text-sm">Lugar</label>
        <select id="lugar" class="input">
          ${lugares.map(l => `<option>${l}</option>`).join("")}
        </select>
      </div>

      <div class="md:col-span-2">
        <label class="font-semibold text-sm">Observaciones lugar</label>
        <input id="observaciones_lugar" class="input">
      </div>

      <div>
        <label class="font-semibold text-sm">Deficiencia</label>
        <select id="deficiencia" class="input">
          ${deficiencias.map(d => `<option>${d}</option>`).join("")}
        </select>
      </div>

      <div class="md:col-span-2">
        <label class="font-semibold text-sm">Observaciones deficiencia</label>
        <input id="observaciones_deficiencias" class="input">
      </div>

      <div>
        <label class="font-semibold text-sm">Estado</label>
        <select id="estado" class="input">
          <option>Pendiente</option>
          <option>Realizada</option>
        </select>
      </div>

      <div class="md:col-span-2">
        <button class="btn w-full">Guardar orden</button>
      </div>

    </form>
  `;
}

/* ================= GUARDAR ================= */

async function guardarOrden(e) {
  e.preventDefault();

  const r = await apiPost({
    accion: "crear",
    nombre: nombre.value,
    lugar: lugar.value,
    observaciones_lugar: observaciones_lugar.value,
    deficiencia: deficiencia.value,
    observaciones_deficiencias: observaciones_deficiencias.value,
    estado: estado.value
  });

  vista.innerHTML = `
    <p class="text-green-600 font-bold">
      ✅ Orden creada correctamente<br>
      Nº de orden: ${r.orden}
    </p>
  `;
}

/* ================= LISTADOS ================= */

async function vistaPendientes() {
  const datos = await apiGet("accion=listar");
  const f = datos.filter(o => o.estado === "Pendiente");

  vista.innerHTML = f.length
    ? f.map(pintarOrden).join("")
    : "<p>No hay pendientes</p>";
}

async function vistaHistorico() {
  const datos = await apiGet("accion=listar");
  const f = datos.filter(o => o.estado === "Realizada");

  vista.innerHTML = f.length
    ? f.map(pintarOrden).join("")
    : "<p>No hay histórico</p>";
}

function pintarOrden(o) {
  return `
    <div class="mb-3 p-4 bg-indigo-50 rounded border-l-4 border-indigo-600">
      <b>Orden ${o.orden}</b><br>
      ${o.nombre} – ${o.lugar}<br>
      ${o.deficiencia}
    </div>
  `;
}
</script>

<style>
.menu-btn {
  background: white;
  padding: 14px;
  border-radius: 12px;
  font-weight: 600;
  box-shadow: 0 4px 10px rgba(0,0,0,.1);
}
.input {
  width: 100%;
  border: 1px solid #ccc;
  padding: 8px;
  border-radius: 8px;
}
.btn {
  background: #4f46e5;
  color: white;
  padding: 12px;
  border-radius: 10px;
  font-weight: 600;
}
</style>

</body>
</html>
