<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Gestión de Órdenes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Tailwind estable -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

  <div class="max-w-5xl mx-auto">

    <!-- TÍTULO -->
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-8">
      🛠️ Gestión de Órdenes de Trabajo
    </h1>

    <!-- BOTONERA -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <button onclick="vistaNueva()" class="menu-btn">➕ Nueva</button>
      <button onclick="vistaPendientes()" class="menu-btn">⏳ Pendientes</button>
      <button onclick="vistaHistorico()" class="menu-btn">📜 Histórico</button>
      <button onclick="vistaConsulta()" class="menu-btn">🔍 Consulta</button>
    </div>

    <!-- CONTENIDO -->
    <div id="vista" class="bg-white rounded-xl shadow p-6 min-h-[250px]">
      <p class="text-center text-gray-400">
        Selecciona una opción del menú
      </p>
    </div>

  </div>

  <script>
    /* ===== ESTADO LOCAL ===== */
    let ordenes = [];
    let contador = 1;

    const vista = document.getElementById("vista");

    /* ===== VISTAS ===== */

    function vistaNueva() {
      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">➕ Nueva orden</h2>

        <form onsubmit="guardarOrden(event)" class="grid gap-4 md:grid-cols-2">

          <div>
            <label class="label">Nombre</label>
            <input id="nombre" required class="input">
          </div>

          <div>
            <label class="label">Lugar</label>
            <select id="lugar" class="input">
              <option>Sala 1</option>
              <option>Sala 2</option>
              <option>Oficina</option>
              <option>Almacén</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <label class="label">Deficiencia</label>
            <select id="deficiencia" class="input">
              <option>Iluminación</option>
              <option>Humedad</option>
              <option>Rotura</option>
              <option>Fuga</option>
            </select>
          </div>

          <div>
            <label class="label">Estado</label>
            <select id="estado" class="input">
              <option>Pendiente</option>
              <option>Realizada</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <button class="btn w-full">Guardar orden</button>
          </div>

        </form>
      `;
    }

    function guardarOrden(e) {
      e.preventDefault();

      const orden = {
        id: contador++,
        nombre: nombre.value,
        lugar: lugar.value,
        deficiencia: deficiencia.value,
        estado: estado.value
      };

      ordenes.push(orden);

      vista.innerHTML = `
        <p class="text-green-600 font-bold">
          ✅ Orden creada correctamente<br>
          Nº de orden: ${orden.id}
        </p>
      `;
    }

    function vistaPendientes() {
      const pendientes = ordenes.filter(o => o.estado === "Pendiente");

      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">⏳ Pendientes</h2>
        ${
          pendientes.length
            ? pendientes.map(pintar).join("")
            : "<p>No hay órdenes pendientes</p>"
        }
      `;
    }

    function vistaHistorico() {
      const realizadas = ordenes.filter(o => o.estado === "Realizada");

      vista.innerHTML = `
        <h2 class="text-xl font-bold mb-4">📜 Histórico</h2>
        ${
          realizadas.length
            ? realizadas.map(pintar).join("")
            : "<p>No hay órdenes realizadas</p>"
        }
      `;
    }

    function vistaConsulta() {
      vista.innerHTML = `
        <p class="text-gray-600">
          Consulta individual (se hará en el siguiente bloque).
        </p>
      `;
    }

    function pintar(o) {
      return `
        <div class="mb-3 p-4 bg-indigo-50 rounded border-l-4 border-indigo-600">
          <p class="font-bold">🧾 Orden ${o.id}</p>
          <p>👤 ${o.nombre}</p>
          <p>📍 ${o.lugar}</p>
          <p>⚠️ ${o.deficiencia}</p>
          <p><em>${o.estado}</em></p>
        </div>
      `;
    }
  </script>

  <style>
    .menu-btn {
      background: white;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,.1);
      transition: all .15s;
    }
    .menu-btn:hover {
      background: #eef2ff;
      transform: translateY(-1px);
    }
    .label {
      font-size: 0.875rem;
      font-weight: 600;
    }
    .input {
      width: 100%;
      border: 1px solid #ccc;
      padding: 8px;
      border-radius: 8px;
    }
    .btn {
      background: #4f46e5;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>

</body>
</html>
