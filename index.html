<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Órdenes de Trabajo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Tailwind correctamente cargado -->
  <script src="https://cdn.tailwindcss.com<style>
    @media print {
      body * { visibility: hidden; }
      #vista, #vista * { visibility: visible; }
      #vista { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto">

  <h1 class="text-3xl md:text-4xl font-bold text-center mb-8 text-indigo-700">
    🛠️ Gestión de Órdenes de Trabajo
  </h1>

  <!-- Botonera -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <button onclick="vistaNueva()" class="card">➕ Nueva</button>
    <button onclick="vistaConsulta()" class="card">🔍 Consulta</button>
    <button onclick="vistaLista('Pendiente')" class="card">⏳ Pendientes</button>
    <button onclick="vistaLista('Realizada')" class="card">📜 Histórico</button>
  </div>

  <!-- Contenido dinámico -->
  <div id="vista" class="bg-white rounded-xl shadow-xl p-6 min-h-[300px]">
    <p class="text-center text-gray-400">Selecciona una opción</p>
  </div>

</div>

<script>
/* ================= CONFIG ================= */

// ✅ TU Apps Script (backend)
const API_URL = "https://script.google.com/macros/s/AKfycbxKb6HMxO4tvf8KyvL5Zqj9p6LuawymwPm_WeY_1zCRuiAxIJwnME6mYRLPW9RLgPA9/exec";

// Referencia al contenedor principal
const vista = document.getElementById("vista");

/* ================= UTILIDADES ================= */

async function apiGet(query) {
  const res = await fetch(API_URL + "?" + query);
  return res.json();
}

async function apiPost(data) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  return res.json();
}

/* ================= VISTAS ================= */

async function vistaNueva() {
  const lugares = await apiGet("accion=lugares");
  const deficiencias = await apiGet("accion=deficiencias");

  vista.innerHTML = `
    <h2 class="text-xl font-bold mb-4">➕ Nueva orden</h2>

    <form onsubmit="crearOrden(event)" class="grid gap-3 md:grid-cols-2">
      <input id="nombre" class="input" placeholder="Nombre">

      <select id="lugar" class="input">
        ${lugares.map(l => `<option>${l}</option>`).join("")}
      </select>

      <input id="obs_lugar" class="input" placeholder="Observaciones lugar">

      <select id="deficiencia" class="input">
        ${deficiencias.map(d => `<option>${d}</option>`).join("")}
      </select>

      <input id="obs_def" class="input" placeholder="Observaciones deficiencia">

      <select id="estado" class="input">
        <option>Pendiente</option>
        <option>Realizada</option>
      </select>

      <button class="btn md:col-span-2">Guardar orden</button>
    </form>
  `;
}

async function crearOrden(e) {
  e.preventDefault();

  const r = await apiPost({
    accion: "crear",
    nombre: nombre.value,
    lugar: lugar.value,
    obs_lugar: obs_lugar.value,
    deficiencia: deficiencia.value,
    obs_deficiencia: obs_def.value,
    estado: estado.value
  });

  vista.innerHTML = `
    <p class="text-green-600 font-bold">
      ✅ Orden creada correctamente<br>
      Nº ${r.orden}
    </p>
  `;
}

function vistaConsulta() {
  vista.innerHTML = `
    <h2 class="text-xl font-bold mb-4">🔍 Consulta</h2>

    <input id="buscar" class="input mb-3" placeholder="Nº de orden">
    <button class="btn" onclick="buscarOrden()">Buscar</button>

    <div id="resultado" class="mt-4"></div>
  `;
}

async function buscarOrden() {
  const r = await apiGet("accion=buscar&orden=" + buscar.value);
  resultado.innerHTML = r.error ? r.error : pintar(r);
}

async function vistaLista(estado) {
  const datos = await apiGet("accion=listar");
  const filtrado = datos.filter(o => o.estado === estado);

  vista.innerHTML = `
    <h2 class="text-xl font-bold mb-4">${estado}</h2>
    <button onclick="window.print()" class="btn mb-4">🖨️ Imprimir</button>
    ${filtrado.length ? filtrado.map(pintar).join("") : "No hay datos"}
  `;
}

/* ================= RENDER ================= */

function pintar(o) {
  return `
    <div class="mb-4 p-4 bg-indigo-50 rounded border-l-4 border-indigo-600">
      <p class="font-bold">🧾 Orden ${o.orden}</p>
      <p>👤 ${o.nombre || "-"}</p>
      <p>📍 ${o.lugar || "-"}</p>
      <p>⚠️ ${o.deficiencia || "-"}</p>
      <p><em>${o.estado}</em></p>
    </div>
  `;
}
</script>

<style>
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,.1);
  font-weight: 600;
  text-align: center;
  cursor: pointer;
}
.input {
  border: 1px solid #ccc;
  padding: 8px;
  border-radius: 8px;
}
.btn {
  background: #4f46e5;
  color: white;
  padding: 10px;
  border-radius: 8px;
}
</style>

</body>
</html>
